<div class="page-wrapper pt-4">
    <div class="page-content pt-0 pe-2 ps-2">
        <div class="container-fluid">
            <!-- Filters and Controls Section -->
            <div class="d-flex justify-content-between align-items-center mb-3">
                <div class="d-flex align-items-center gap-3">
                    <label for="entriesSelect" class="mb-0">Show</label>
                    <select id="entriesSelect" class="form-select form-select-sm" style="width: auto;">
                        <option>10</option>
                        <option>25</option>
                        <option>50</option>
                    </select>
                    <span class="text-muted">entries</span>
                </div>
                <div>
                    <input type="text" class="form-control form-control-sm" placeholder="Search..." style="width: 200px;">
                </div>
            </div>

            <!-- Tenant Filter -->
            <div class="mb-2" *ngIf="isSuperAdmin">
                <select [(ngModel)]='tId' (change)="changeTname()"
                    class="form-select form-select-sm" style="max-width: 250px;">
                    <option value="">Select Tenant</option>
                    <option *ngFor="let item of tenanates" [value]='item.TNT_CODE'>
                        {{item.TNT_NAME}}
                    </option>
                </select>
            </div>

            <!-- Table Section -->
            <div class="table-responsive">
                <table datatable id="DataTables_Table_0" [dtOptions]="dtOptions"
                    [dtTrigger]="dtTrigger"
                    class="table table-striped table-bordered table-sm mb-0"
                    style="width:100%">
                    <thead style="background-color: #2e7d32; color:#ffffff; font-weight: 600;">
                        <tr>
                            <th style="width: 8%; padding: 12px 8px;">S.No</th>
                            <th style="padding: 12px 8px;">Category Name</th>
                            <th style="width: 12%; padding: 12px 8px;" *ngIf="isSuperAdmin">Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr *ngFor="let item of table let i=index">
                            <td style="padding: 10px 8px;">{{i+1}}</td>
                            <td style="padding: 10px 8px;">{{item.COURSE_CATEGORY_NAME}}</td>
                            <td style="padding: 10px 8px; text-align: center;" *ngIf="isSuperAdmin">
                                <button class="btn btn-sm btn-success rounded-circle"
                                    data-bs-toggle="modal" data-bs-target="#myModal"
                                    (click)="edit(item)"
                                    title="Edit"
                                    style="width: 28px; height: 28px; padding: 0; display: inline-flex; align-items: center; justify-content: center;">
                                    <i class="bi bi-pencil" style="font-size: 14px;"></i>
                                </button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- Pagination Info -->
            <div class="d-flex justify-content-between align-items-center mt-3">
                <span class="text-muted small">Showing 1 to {{table?.length || 0}} of {{table?.length || 0}} entries</span>
                <div>
                    <button class="btn btn-sm btn-outline-secondary me-1">Previous</button>
                    <button class="btn btn-sm btn-outline-secondary">Next</button>
                </div>
            </div>
        </div>
    </div>
</div>



<div class="modal" id="myModal" data-backdrop="static" data-keyboard="false">
    <div class="modal-dialog ">
        <div class="modal-content">

            <!-- Modal Header  -->
            <div class="modal-header py-2" style="background-color: #2e7d32; color: white;">
                <h4 *ngIf="!isEdit" class="modal-title w-100" style="color: white;"> Add Course Category</h4>
                <h4 *ngIf="isEdit" class="modal-title w-100" style="color: white;"> Edit Course Category</h4>
                <button type="button" (click)="close()" class="close" data-bs-dismiss="modal" style="color: white;"><i
                        class="fas fa-times"></i></button>
            </div>

            <!-- Modal body  -->
            <div class="modal-body">
                <form class="well form-horizontal" [formGroup]="myForm">
                    <fieldset>
                        <div class="form-group row">
                            <label class="col-md-4 control-label line_2 rem_1">
                                Name <span class="text-danger">*</span></label>
                            <div class="col-md-8 inputGroupContainer">
                                <div class="input-group">
                                    <input placeholder="" class="form-control" formControlName="MNAME">
                                </div>
                            </div>
                            <div *ngIf="myForm.get('MNAME').touched">
                                <span class="text-danger" *ngIf="myForm.get('MNAME').hasError('required')">
                                    Category Name is required.
                                </span>

                            </div>

                        </div>
                        <!-- <div class="form-group row pt-4">
                            <label class="col-md-4 control-label line_2 rem_1">
                                Description </label>
                            <div class="col-md-8 inputGroupContainer">
                                <div class="input-group">
                                    <textarea placeholder="" class="form-control"
                                        formControlName="MDESCRIPTION"></textarea>
                                </div>
                            </div>
                        </div> -->



                        <div div class="form-group row pt-4">
                            <div class="card h-100">
                                <div class="card-header">
                                    <h6 class="mb-0">Category Image <span class="text-danger">*</span></h6>
                                </div>
                                <div class="card-body text-center">
                                    <img [src]="imageURL" class="img-fluid">
                                </div>
                                <div class="card-footer bg-white">


                                    <input type="file" id="materialFile1" style="min-height: 30px;" placeholder=""
                                        (change)="changeFile($event)" formControlName="IMAGE_URL"
                                        accept="'png', 'jpg', 'PNG', 'jpeg', 'gif', 'JPEG', 'image'"
                                        class="form-control form-control-sm shadow-sm rounded-lg d-none">
                                    <button type="button" (click)="onCategoryImage()"
                                        class="btn btn-upload-image d-grid gap-2 mx-auto col-7">Upload Image</button>
                                </div>


                            </div>
                        </div>



                        <div class="form-group row pt-4">
                            <label class="col-md-4 control-label">Status</label>
                            <div class="col-md-8 inputGroupContainer">
                                <div class="input-group">
                                    <select class="form-control form-control-sm shadow-sm rounded-lg" id="sel1"
                                        formControlName="MSTATUS">
                                        <option value=true>Active</option>
                                        <option value=false>InActive </option>
                                    </select>
                                </div>
                            </div>
                        </div>
                    </fieldset>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" *ngIf="!isEdit" (click)="onSubmit(myForm)"
                    class="btn btn-sm  btn-save">Save</button>
                <button type="button" *ngIf="isEdit" (click)="onSubmit(myForm)"
                    class="btn btn-sm  btn-save">Update</button>
                <button type="button" class="btn btn-danger btn-sm" id='md_close' (click)="close()"
                    data-bs-dismiss="modal">Close</button>
            </div>
        </div>
    </div>
</div>
