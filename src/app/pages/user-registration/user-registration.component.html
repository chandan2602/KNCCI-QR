<div class="user-registration-page">
    <div class="container-fluid">
        <div class="page-header">
            <h1 class="page-title">
                {{isAdmin ? 'User Registration' : 'My Profile'}}
            </h1>
        </div>

        <div class="table-container">
            <!-- Filters Section -->
            <div class="filters-section">
                <div class="filter-group" *ngIf='roleId=="4"'>
                    <label class="filter-label">Tenant Name</label>
                    <select [(ngModel)]='tId' (change)="changeTname()" class="filter-select">
                        <option value="">Select Tenant</option>
                        <option *ngFor="let item of tenanates" [value]='item.TNT_CODE'>
                            {{item.TNT_NAME}}
                        </option>
                    </select>
                </div>
                
                <div class="filter-group" *ngIf='isAdmin'>
                    <label class="filter-label">User Role</label>
                    <select [(ngModel)]='rId' (change)="change()" class="filter-select">
                        <option value="">Select Role</option>
                        <option *ngFor="let item of roles" [value]='item.ROLE_ID'>
                            {{item.ROLE_NAME}}
                        </option>
                    </select>
                </div>

                <div class="filter-actions" *ngIf='isAdmin'>
                    <button type="button" class="btn-add" (click)="add()">
                        <i class="fas fa-plus"></i>
                        Add User
                    </button>
                </div>
            </div>

            <!-- Table Section -->
            <div class="table-responsive" *ngIf="table.length > 0">
                <table class="users-table">
                    <thead>
                        <tr>
                            <th>S. No</th>
                            <th>User Name</th>
                            <th>First Name</th>
                            <th>Role</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr *ngFor="let item of table; let i = index">
                            <td>{{ i + 1 }}</td>
                            <td class="username-cell">{{item.USERNAME}}</td>
                            <td>{{item.FIRSTNAME}}</td>
                            <td>
                                <span class="badge-role">{{item.ROLE_NAME}}</span>
                            </td>
                            <td>
                                <span class="status-badge" 
                                      [ngClass]="{
                                        'status-active': item.STATUS?.toLowerCase() === 'active',
                                        'status-inactive': item.STATUS?.toLowerCase() === 'inactive'
                                      }">
                                    {{item.STATUS}}
                                </span>
                            </td>
                            <td>
                                <div class="action-buttons">
                                    <button class="btn-action btn-edit" 
                                            (click)="edit(item)"
                                            title="Edit User">
                                        <i class="fas fa-pen"></i>
                                    </button>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- Empty State -->
            <div class="empty-state" *ngIf="table.length === 0">
                <i class="fas fa-users"></i>
                <p>No users found</p>
                <small>Select a role to view users or add a new user</small>
            </div>
        </div>
    </div>
</div>
