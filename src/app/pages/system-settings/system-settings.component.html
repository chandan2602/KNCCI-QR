<div class="page-wrapper pt-4">
    <div class="page-content pt-0 pe-0 ps-0">
        <div class="container-fluid">
            <div class="default_class">
                <div class="content-wrapper p-0">
                    <div class="container-fluid">
                        <div class="row">
                            <div class="col-xl-12">
                                <div class="card rounded shadow-lg">
                                    <div class="card-header headerbg" style="border-bottom:3px solid #d8eff8;">
                                        <h5 class="mb-0">System Settings</h5>
                                    </div>
                                    <div class="card-body">
                                        <div class="alert alert-info">
                                            <i class="bi bi-info-circle"></i> 
                                            <strong>Super Admin Controls:</strong> Manage system-wide features and settings.
                                        </div>

                                        <div class="settings-section mt-4">
                                            <h6 class="mb-3">Subscription Management</h6>
                                            
                                            <div class="card p-4">
                                                <div class="row align-items-center">
                                                    <div class="col-md-8">
                                                        <h6>Subscription Feature</h6>
                                                        <p class="text-muted mb-0">
                                                            Control whether users can subscribe to paid plans. 
                                                            When disabled, the subscription page will not be accessible.
                                                        </p>
                                                    </div>
                                                    <div class="col-md-4 text-end">
                                                        <div class="form-check form-switch d-inline-block">
                                                            <input 
                                                                class="form-check-input" 
                                                                type="checkbox" 
                                                                role="switch" 
                                                                id="subscriptionToggle"
                                                                [checked]="settings.subscriptionEnabled"
                                                                (change)="toggleSubscription()"
                                                                style="width: 3rem; height: 1.5rem; cursor: pointer;">
                                                            <label class="form-check-label ms-2" for="subscriptionToggle">
                                                                <span class="badge" 
                                                                      [ngClass]="settings.subscriptionEnabled ? 'bg-success' : 'bg-secondary'">
                                                                    {{ settings.subscriptionEnabled ? 'Enabled' : 'Disabled' }}
                                                                </span>
                                                            </label>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>

                                        <div class="mt-4">
                                            <button type="button" (click)="back()" class="btn btn-secondary btn-sm">
                                                <i class="bi bi-arrow-left"></i> Back
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
