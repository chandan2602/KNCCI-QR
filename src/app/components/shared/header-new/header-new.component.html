<!-- Modal Structure -->
<div class="modal fade" id="signupModal" tabindex="-1" aria-labelledby="signupModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title" id="signupModalLabel">Signup 3</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" id="cls" aria-label="Close"></button>
            </div>

            <div class="modal-body">
                <!-- Signup form or content -->
                <label for="floatingSelectDisabled">I am a</label>
                <div class="">
                    <select class="form-select" (change)="signUPLogin($any($event.target).value)">
                        <option>Select</option>
                        <option value="1">Company</option>
                        <option value="2">Job Seeker</option>
                        <option value="3">Founder</option>
                        <option value="4">Incubator</option>
                        <option value="5">Investor</option>
                    </select>

                </div>


            </div>

            <!-- <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                <button type="button" class="btn btn-primary">Submit</button>
            </div> -->

        </div>
    </div>
</div>
