<div class="pt-4">
    <div class="page-content pt-0 pe-0 ps-0">
        <div class="container-fluid">
            <div class="default_class">
                <div class="content-wrapper p-0">
                    <div class="container-fluid">
                        <div class="row">
                            <div class="col-xl-12">
                                <div class="card rounded shadow-lg">
                                    <div class="card-header  headerbg" style="border-bottom:3px solid #d8eff8;">
                                        <h5 class="mb-0">
                                            Internships
                                            <button class="btn btn-sm"
                                                [appTooltip]="tooltipContent">
                                                <i class="bi bi-info-circle-fill"></i>
                                            </button>
                                        </h5>

                                    </div>
                                    <div class="card-body">
                                        <div class="row">
                                            <div class="col-xl-4 mb-3">
                                                <select id="companySelect"
                                                    class="form-select form-select-sm shadow-sm rounded"
                                                    [(ngModel)]="intrenshipPL" name="company_id"
                                                    (change)="getCourseList()">
                                                    <option value="0" selected>Choose Company</option>
                                                    <option *ngFor="let item of companyList" [value]="item.COMPANY_ID">
                                                        {{
                                                        item.COMPANY_NAME }}</option>
                                                </select>
                                            </div>
                                        </div>
                                        <div class="row">
                                            <div class="col-xl-4 col-md-6 mb-5" *ngFor="let internship of internships">
                                                <div class="internship-card">
                                                    <!-- Card Image -->
                                                    <div class="card-image-wrapper">
                                                        <img [src]="internship.image" alt="internship" class="card-image" />
                                                        <div class="verified-badge" *ngIf="internship.verified">
                                                            <i class="fas fa-check-circle"></i> VERIFIED
                                                        </div>
                                                        <div class="company-logo">
                                                            <img [src]="internship.logo" alt="company" />
                                                        </div>
                                                    </div>

                                                    <!-- Card Content -->
                                                    <div class="card-content">
                                                        <h3 class="internship-title">{{ internship.title }}</h3>
                                                        <p class="company-name">{{ internship.company }}</p>

                                                        <!-- Badge and Duration -->
                                                        <div class="badge-duration">
                                                            <span class="badge">{{ internship.type }}</span>
                                                            <span class="duration">{{ internship.duration }}</span>
                                                        </div>

                                                        <!-- Details -->
                                                        <div class="details">
                                                            <div class="detail-item">
                                                                <i class="fas fa-map-marker-alt"></i>
                                                                <span>{{ internship.location }}</span>
                                                            </div>
                                                            <div class="detail-item">
                                                                <i class="fas fa-money-bill-wave"></i>
                                                                <span>{{ internship.salary }}</span>
                                                            </div>
                                                            <div class="detail-item">
                                                                <i class="fas fa-calendar"></i>
                                                                <span>{{ internship.deadline }}</span>
                                                            </div>
                                                        </div>

                                                        <!-- Description -->
                                                        <p class="description">{{ internship.description }}</p>

                                                        <!-- Buttons -->
                                                        <div class="card-buttons">
                                                            <button class="btn btn-apply">Quick Apply</button>
                                                            <button class="btn btn-details">View Details</button>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                        <div *ngIf="internships.length == 0">
                                            <h3 class="text-center">No Internships available</h3>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
