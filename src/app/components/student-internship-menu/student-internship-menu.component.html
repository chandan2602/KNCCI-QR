<div class="page-wrapper pt-4">
    <div class="page-content pt-0 pe-0 ps-0">
        <div class="container-fluid">
            <div class="default_class">
                <div class="content-wrapper p-0">
                    <div class="container-fluid">
                        <div class="row">
                            <div class="col-xl-12">
                                <div class="card rounded shadow-lg">
                                 
                                    <div class="card-body">
                                        <ul class="nav nav-tabs" id="myTab" role="tablist">
                                            <li class="nav-item" role="presentation">
                                                <button class="nav-link" [class.active]="activeTab === 'intrnShipLst'"
                                                    (click)="activeTab = 'intrnShipLst'" type="button"
                                                    role="tab">Applied Internships</button>
                                            </li>
                                            <li class="nav-item" role="presentation">
                                                <button class="nav-link" [class.active]="activeTab === 'scheduleAll'"
                                                    (click)="activeTab = 'scheduleAll'" type="button" role="tab">All
                                                    Internships</button>
                                            </li>
                                            <li class="nav-item" role="presentation">
                                                <button class="nav-link" [class.active]="activeTab === 'schedule'"
                                                    (click)="activeTab = 'schedule'" type="button" role="tab">AI
                                                    Internships</button>
                                            </li>
                                            <li class="nav-item" role="presentation">
                                                <button class="nav-link" [class.active]="activeTab === 'aplictn'"
                                                    (click)="activeTab = 'aplictn'" type="button" role="tab">My
                                                    Internships</button>
                                            </li>
                                        </ul>
                                        <div class="tab-content" id="myTabContent">
                                            <div class="tab-pane fade" [class.active]="activeTab === 'intrnShipLst'"
                                                [class.show]="activeTab === 'intrnShipLst'">
                                                <app-student-applied-internships
                                                    *ngIf="activeTab === 'intrnShipLst'"></app-student-applied-internships>
                                            </div>
                                            <div class="tab-pane fade" [class.active]="activeTab === 'scheduleAll'"
                                                [class.show]="activeTab === 'scheduleAll'">
                                                <app-intrenship-lst
                                                    *ngIf="activeTab === 'scheduleAll'"></app-intrenship-lst>
                                            </div>
                                            <div class="tab-pane fade" [class.active]="activeTab === 'schedule'"
                                                [class.show]="activeTab === 'schedule'">
                                                <app-student-internship-recommender
                                                    *ngIf="activeTab === 'schedule'"></app-student-internship-recommender>
                                            </div>

                                            <div class="tab-pane fade" [class.active]="activeTab === 'aplictn'"
                                                [class.show]="activeTab === 'aplictn'">
                                                <app-my-courses *ngIf="activeTab === 'aplictn'"></app-my-courses>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
